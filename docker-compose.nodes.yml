# Docker Compose file to run all three nodes: microstructure, sentiment, macro
version: '3.8'
services:
  node_microstructure:
    build:
      context: ./server
      dockerfile: ../Dockerfile
    command: node node_microstructure.js
    ports:
      - "4001:4001"
    environment:
      NODE_ENV: production
    working_dir: /app/server

  node_sentiment:
    build:
      context: ./server
      dockerfile: ../Dockerfile
    command: node node_sentiment.js
    ports:
      - "4002:4002"
    environment:
      NODE_ENV: production
    working_dir: /app/server

  node_macro:
    build:
      context: ./server
      dockerfile: ../Dockerfile
    command: node node_macro.js
    ports:
      - "4003:4003"
    environment:
      NODE_ENV: production
    working_dir: /app/server
